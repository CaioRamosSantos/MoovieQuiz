<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoovieQuiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section id="lobby" class="screen">
            <h1>Moovie<span>Quiz</span></h1>
            <p>Desafie outro jogador para uma batalha!</p>
            <input type="text" id="username" placeholder="Digite seu nick...">
            <button id="btn-start">Procurar Partida</button>
        </section>

        <section id="game" class="screen hidden">
            <div class="game-header">
                <div class="score">Você: <span id="my-score">0</span></div>
                <div class="round">Rodada <span id="current-round">1</span>/4</div>
                <div class="score">Rival: <span id="p2-score">0</span></div>
            </div>
            <div class="frame-container">
                <img src="" alt="Movie Frame">
                <div id="feedback" class="hidden">Acertou!</div>
            </div>
            <div class="input-area">
                <input type="text" id="guess-input" placeholder="Qual é o filme?">
                <button id="btn-guess">Enviar</button>
            </div>
        </section>

        <section id="results" class="screen hidden">
            <h2 id="winner-text">Você venceu!</h2>
            <button onclick="location.reload()">Jogar Novamente</button>
        </section>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
